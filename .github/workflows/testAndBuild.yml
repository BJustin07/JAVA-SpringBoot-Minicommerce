name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean package --file pom.xml

    - name: Docker Login
      uses: docker/login-action@v4.2.0
      with:
        registry: ghcr.io
        username: ${{github.actor}}
        password: ${{secrets.GITHUB_TOKEN}}

    - name: Docker Build
      run: |
        docker build \
          -t ghcr.io/bjustin07/mini-commerce-api:latest \
          -t ghcr.io/bjustin07/mini-commerce-api:${{ github.sha }} \
          .
    - name: Push Image to GHCR
      run: |
        docker push ghcr.io/bjustin07/mini-commerce-api:latest
        docker push ghcr.io/bjustin07/mini-commerce-api:${{github.sha}}

    
