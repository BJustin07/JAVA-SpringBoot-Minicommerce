name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean package --file pom.xml

    - name: Docker Login
      uses: docker/login-action@v4.2.0
      with:
        registry: ghcr.io
        username: ${{github.actor}}
        password: ${{secrets.GITHUB_TOKEN}}

    - name: Docker Build
      run: |
        docker build \
          -t ghcr.io/bjustin07/mini-commerce-api:latest \
          -t ghcr.io/bjustin07/mini-commerce-api:${{ github.sha }} \
          .
    - name: Push Image to GHCR
      run: |
        docker push ghcr.io/bjustin07/mini-commerce-api:latest
        docker push ghcr.io/bjustin07/mini-commerce-api:${{github.sha}}

    - name: Pull and Build via SSH EC2 (Test)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{secrets.EC2_HOST_IP}}
        username: ubuntu
        key: ${{secrets.EC2_SECRET}}
        script: |
          # whoami
          # hostname
          docker ps -a
          sudo docker pull ghcr.io/bjustin07/mini-commerce-api:latest

          sudo docker stop mini-commerce-api
          sudo docker rm -f mini-commerce-api

          docker ps -a
    
          sudo docker run -d \
            --name mini-commerce-api \
            -p 8080:8080 \
            ghcr.io/bjustin07/mini-commerce-api:latest
          

    
